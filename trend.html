<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">类型风向标 · 女频新书榜</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.14.0/dist/tabler-icons.min.css">
    <meta name="description" id="page-desc" content="按类型聚合番茄小说榜单多日趋势，观察题材风向、上榜波动和阅读增长。">
</head>
<body class="trend-page">
    <div class="trend-shell">
        <header class="trend-topbar">
            <div class="trend-topbar-left">
                <a href="index.html" class="back-link"><i class="ti ti-arrow-left"></i> 返回榜单</a>
                <h1 id="trend-title">类型风向标</h1>
                <p id="trend-subtitle">加载中...</p>
            </div>
            <div class="trend-controls">
                <!-- 四榜 Tab 切换 -->
                <div class="list-tabs list-tabs-sm" id="list-tabs">
                    <button class="list-tab active" data-key="female_new" title="女频新书榜">
                        <i class="ti ti-heart"></i><span class="tab-label">女新书</span>
                    </button>
                    <button class="list-tab" data-key="female_read" title="女频阅读榜">
                        <i class="ti ti-heartbeat"></i><span class="tab-label">女阅读</span>
                    </button>
                    <button class="list-tab" data-key="male_new" title="男频新书榜">
                        <i class="ti ti-user"></i><span class="tab-label">男新书</span>
                    </button>
                    <button class="list-tab" data-key="male_read" title="男频阅读榜">
                        <i class="ti ti-users"></i><span class="tab-label">男阅读</span>
                    </button>
                </div>
                <div class="trend-range" id="trend-range">
                    <button class="range-btn active" data-days="7">7日</button>
                    <button class="range-btn" data-days="14">14日</button>
                    <button class="range-btn" data-days="30">30日</button>
                    <button class="range-btn" data-days="all">全部</button>
                </div>
            </div>
        </header>

        <main>
            <section class="market-board">
                <article class="market-summary-card">
                    <span class="panel-kicker">全站热点</span>
                    <h2>当下火热类型与题材</h2>
                    <p id="market-summary">正在读取最新榜单和近期趋势。</p>
                    <small id="market-source" class="market-source">统计中</small>
                </article>
                <article class="market-card">
                    <span class="panel-kicker">综合赛道</span>
                    <div id="hot-genre-list" class="hot-list"></div>
                </article>
                <article class="market-card">
                    <span class="panel-kicker">具体分类</span>
                    <div id="hot-type-list" class="hot-list"></div>
                </article>
                <article class="market-card">
                    <span class="panel-kicker">高频题材</span>
                    <div id="hot-theme-list" class="theme-cloud"></div>
                </article>
            </section>

            <section class="type-filter-panel">
                <span class="panel-kicker">类型</span>
                <div id="trend-category-buttons" class="trend-category-buttons"></div>
            </section>

            <section class="trend-grid">
                <article class="trend-block">
                    <span class="panel-kicker">新增在读</span>
                    <h2>阅读增长焦点</h2>
                    <div id="reads-list" class="compact-list"></div>
                </article>

                <article class="trend-block">
                    <span class="panel-kicker">排名动能</span>
                    <h2>上升作品</h2>
                    <div id="risers-list" class="compact-list"></div>
                </article>

                <article class="trend-block">
                    <span class="panel-kicker">题材入口</span>
                    <h2>新上榜焦点</h2>
                    <div id="new-books-list" class="compact-list"></div>
                </article>

                <article class="trend-block trend-block-wide">
                    <span class="panel-kicker">连续观察</span>
                    <h2>每日风向摘要</h2>
                    <div id="summary-feed" class="summary-feed"></div>
                </article>
            </section>
        </main>
    </div>

    <!-- 四榜配置 -->
    <script>
        window.FANQIE_LISTS = {
            female_new: { name: "女频新书榜", file_key: "female_new", color: "#EC4899", icon: "ti-heart" },
            female_read: { name: "女频阅读榜", file_key: "female_read", color: "#F472B6", icon: "ti ti-heartbeat" },
            male_new: { name: "男频新书榜", file_key: "male_new", color: "#3B82F6", icon: "ti-user" },
            male_read: { name: "男频阅读榜", file_key: "male_read", color: "#60A5FA", icon: "ti-users" }
        };
        window.CURRENT_LIST_KEY = "female_new";
    </script>
    <script src="js/trend.js"></script>
</body>
</html>
