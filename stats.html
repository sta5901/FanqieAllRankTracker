<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图表数据 · 番茄风向标</title>
    <meta name="description" content="番茄小说四榜阅读数据可视化统计">

    <link rel="stylesheet" href="css/style.css">
    <!-- Tabler Icons CDN -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.14.0/dist/tabler-icons.min.css">
    <!-- ECharts CDN -->
    <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
</head>

<body class="stats-page">
    <div class="stats-shell">
        <header class="stats-topbar">
            <div class="stats-topbar-left">
                <a href="index.html" class="back-link"><i class="ti ti-arrow-left"></i> 返回榜单</a>
                <h1>数据图表</h1>
                <p id="stats-subtitle">加载中...</p>
            </div>
            <div class="stats-controls">
                <!-- 四榜 Tab 切换 -->
                <div class="list-tabs list-tabs-sm" id="stats-rank-tabs">
                    <button class="list-tab active" data-key="male_new" title="男频新书榜">
                        <i class="ti ti-user"></i><span class="tab-label">男新书</span>
                    </button>
                    <button class="list-tab" data-key="male_read" title="男频阅读榜">
                        <i class="ti ti-users"></i><span class="tab-label">男阅读</span>
                    </button>
                    <button class="list-tab" data-key="female_new" title="女频新书榜">
                        <i class="ti ti-heart"></i><span class="tab-label">女新书</span>
                    </button>
                    <button class="list-tab" data-key="female_read" title="女频阅读榜">
                        <i class="ti ti-heartbeat"></i><span class="tab-label">女阅读</span>
                    </button>
                </div>
            </div>
        </header>

        <!-- 统计概览 -->
        <section class="stats-board">
            <article class="stat-summary-card">
                <span class="panel-kicker">数据总览</span>
                <h2>榜单阅读数据概览</h2>
                <p id="stats-summary-text">正在读取最新榜单数据。</p>
                <small id="stats-source" class="market-source">统计中</small>
            </article>
            <article class="market-card">
                <span class="panel-kicker">上榜作品</span>
                <div class="stat-big-value" id="total-books">--</div>
            </article>
            <article class="market-card">
                <span class="panel-kicker">活跃分类</span>
                <div class="stat-big-value" id="total-cats">--</div>
            </article>
            <article class="market-card">
                <span class="panel-kicker">总在读人数</span>
                <div class="stat-big-value" id="total-reads">--</div>
            </article>
        </section>

        <!-- 图表网格 -->
        <main class="stats-grid">
            <!-- 图表一：分类在读排行（竖向柱状图，所有分类） -->
            <section class="trend-block trend-block-wide">
                <span class="panel-kicker">分类排行</span>
                <h2>分类在读人数排行</h2>
                <div id="chart-category-bar" class="chart-container chart-container-tall"></div>
            </section>

            <!-- 图表二：单书 Top 20 -->
            <section class="trend-block">
                <span class="panel-kicker">单书排行</span>
                <h2>单书在读 Top 20</h2>
                <div id="chart-top-books" class="chart-container chart-container-tall"></div>
            </section>

            <!-- 图表三：趋势线图 -->
            <section class="trend-block trend-block-wide">
                <span class="panel-kicker">趋势变化</span>
                <h2>分类在读趋势</h2>
                <div id="chart-trend-line" class="chart-container"></div>
            </section>

            <!-- 图表四：分类最高/最低/均值在读 -->
            <section class="trend-block">
                <span class="panel-kicker">极值分析</span>
                <h2>分类在读最高/最低/均值</h2>
                <div id="chart-category-stats" class="chart-container chart-container-tall"></div>
            </section>

            <!-- 图表五：四榜对比雷达 -->
            <section class="trend-block trend-block-wide">
                <span class="panel-kicker">四榜对比</span>
                <h2>四榜分类对比雷达</h2>
                <div id="chart-radar-compare" class="chart-container chart-container-tall"></div>
            </section>
        </main>
    </div>

    <!-- 四榜配置 -->
    <script>
        window.FANQIE_LISTS_STATS = {
            male_new: { name: "男频新书榜", file_key: "male_new", color: "#3B82F6", icon: "ti-user" },
            male_read: { name: "男频阅读榜", file_key: "male_read", color: "#60A5FA", icon: "ti-users" },
            female_new: { name: "女频新书榜", file_key: "female_new", color: "#EC4899", icon: "ti-heart" },
            female_read: { name: "女频阅读榜", file_key: "female_read", color: "#F472B6", icon: "ti-heartbeat" }
        };
    </script>
    <script src="js/stats.js"></script>
</body>

</html>
